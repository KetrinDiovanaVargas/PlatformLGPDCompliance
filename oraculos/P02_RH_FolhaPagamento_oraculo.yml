    severidade: moderada
    evidencia_esperada: "envia planilha com dados de folha pelo e-mail pessoal em urgências"
    perguntas_que_deveriam_detectar:
      - "O que você faz quando precisa enviar algo com urgência fora do sistema?"
      - "Você já usou e-mail pessoal para enviar arquivos do trabalho?"

