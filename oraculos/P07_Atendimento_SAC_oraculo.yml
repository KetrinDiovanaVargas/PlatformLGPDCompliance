    categoria: Coleta excessiva
    severidade: alta
    evidencia_esperada: "solicita CPF em todos os atendimentos incluindo os que não exigem identificação"
    perguntas_que_deveriam_detectar:
      - "Quais dados você coleta no início de um atendimento?"
      - "É sempre necessário pedir o CPF do cliente?"
