categorias_lgpd_esperadas:
  - codigo: F2
    categoria: Armazenamento indevido
    severidade: alta
    evidencia_esperada: "fotos de documentos pessoais ficam na galeria do celular pessoal"
    perguntas_que_deveriam_detectar:
      - "Como você envia os documentos dos terceirizados para o RH?"
      - "O que acontece com as fotos depois que você envia?"
