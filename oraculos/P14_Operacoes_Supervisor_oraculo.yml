  - "menciona WhatsApp ao ser perguntado sobre envio de documentos"
  - "não considera problema as fotos ficarem na galeria do celular"

nao_deve_ser_detectado:
  - "exposição financeira a terceiros"
  - "uso secundário de dados comerciais"

criterio_de_sucesso:
  minimo: "detectar armazenamento de documentos em dispositivo pessoal"
  ideal: "detectar celular pessoal, WhatsApp, galeria sem exclusão e dado de saúde sem salvaguarda"
