  - codigo: F1
    categoria: Compartilhamento informal
    severidade: alta
    evidencia_esperada: "envia documentos com dados pessoais sensíveis por WhatsApp"
    perguntas_que_deveriam_detectar:
      - "Por qual canal você manda esses documentos?"

  - codigo: F9
    categoria: Dados sensíveis sem salvaguarda
    severidade: moderada
    evidencia_esperada: "ASO (dado de saúde) fotografado e enviado sem controle de acesso"
    perguntas_que_deveriam_detectar:
      - "Você também fotografa os exames médicos ou ASO dos terceirizados?"

