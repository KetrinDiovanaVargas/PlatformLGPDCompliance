categorias_lgpd_esperadas:
  - codigo: F9
    categoria: Dados sensíveis sem salvaguarda
    severidade: critica
    evidencia_esperada: "anotações de sessão em app de notas de celular pessoal sem criptografia"
    perguntas_que_deveriam_detectar:
      - "Como você registra o conteúdo das sessões?"
      - "Essas anotações ficam no seu celular pessoal?"
