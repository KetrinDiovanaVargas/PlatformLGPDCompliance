    severidade: alta
    evidencia_esperada: "laudos psicológicos enviados por e-mail pessoal sem criptografia"
    perguntas_que_deveriam_detectar:
      - "Como você envia laudos para outros profissionais ou para o paciente?"
      - "Esse e-mail tem alguma criptografia ou proteção adicional?"

criterio_de_sucesso:
  minimo: "detectar dado de saúde mental armazenado em dispositivo pessoal sem proteção"
